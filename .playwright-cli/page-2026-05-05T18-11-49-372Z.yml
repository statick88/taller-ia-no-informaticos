                  - 'link "Permalink: ❓ FAQ" [ref=e1342] [cursor=pointer]':
                    - /url: "#-faq"
                    - img [ref=e1343]
                - paragraph [ref=e1345]:
                  - strong [ref=e1346]: What is Open Cowork?
                  - text: Open Cowork is a free, open-source desktop application that provides a local AI agent workspace. It wraps AI models (Claude, GPT, Gemini, DeepSeek, etc.) into a GUI with one-click installers for Windows and macOS — no terminal or coding knowledge required.
                - paragraph [ref=e1347]:
                  - strong [ref=e1348]: How is Open Cowork different from Claude Cowork?
                  - text: Open Cowork is the open-source implementation of Claude Cowork. It adds multi-model support (not just Claude), GUI automation via computer use, remote control through Feishu/Slack, and VM-level sandbox isolation. See the
                  - link "feature comparison table" [ref=e1349] [cursor=pointer]:
                    - /url: "#features"
                  - text: for details.
                - paragraph [ref=e1350]:
                  - strong [ref=e1351]: What AI models does Open Cowork support?
                  - text: Claude (via Anthropic or OpenRouter), OpenAI-compatible APIs, and Chinese models including GLM (Zhipu AI), MiniMax, and Kimi. Any provider offering an OpenAI-compatible API endpoint can be configured.
                - paragraph [ref=e1352]:
                  - strong [ref=e1353]: Is Open Cowork free?
                  - text: Yes. Open Cowork itself is completely free and open-source under the MIT license. You only need to pay for the AI model API usage from your chosen provider.
                - paragraph [ref=e1354]:
                  - strong [ref=e1355]: Does Open Cowork work on Linux?
                  - text: Currently, Open Cowork provides pre-built installers for Windows and macOS only. Linux users can build from source — see the
                  - link "Build from Source" [ref=e1356] [cursor=pointer]:
                    - /url: "#installation"
                  - text: section.
                - paragraph [ref=e1357]:
                  - strong [ref=e1358]: How does sandbox isolation work?
                  - text: "Open Cowork offers multi-level protection: basic path-based restrictions on all platforms, and enhanced VM-level isolation using WSL2 (Windows) or Lima (macOS). When a VM is available, all commands execute inside an isolated Linux environment, protecting your host system."
                - paragraph [ref=e1359]:
                  - strong [ref=e1360]: What are Skills and how do I create custom ones?
                  - text: Skills are built-in workflows for specific tasks like generating PPTX, DOCX, PDF, or XLSX files. Open Cowork ships with default skills under
                  - code [ref=e1361]: .claude/skills/
                  - text: and includes a
                  - code [ref=e1362]: skill-creator
                  - text: tool to help you build your own custom skills.
                - paragraph [ref=e1363]:
                  - strong [ref=e1364]: What is MCP and how does it work?
                  - text: MCP (Model Context Protocol) lets AI connect to external tools and services. Open Cowork supports MCP connectors for browsers, Notion, and other desktop apps — extending the AI's capabilities beyond just file management and code.
                - paragraph [ref=e1365]:
                  - strong [ref=e1366]: How do I set up remote control via Feishu or Slack?
                  - text: Open Cowork supports remote control through Feishu (Lark) and Slack integration, allowing you to send commands and receive results from collaboration platforms. Check the app settings for remote control configuration.
                - paragraph [ref=e1367]:
                  - strong [ref=e1368]: Is my data safe? Does Open Cowork send data to external servers?
                  - text: Open Cowork runs locally on your machine. Your files stay in your workspace. The only external communication is with the AI model API you configure (e.g., Anthropic, OpenRouter). No data is sent to Open Cowork servers.
