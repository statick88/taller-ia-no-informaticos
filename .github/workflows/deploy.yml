# Deploy ebook to GitHub Pages
# Runs on push to main, builds _book/ and deploys to gh-pages branch

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.9.37

      - name: Ensure DS_Store gitignore
        run: |
          cat >> .gitignore << 'EOF'
          .DS_Store
          .DS_Store?
          ._*
          Thumbs.db
          ehthumbs.db
          EOF

      - name: Render ebook (HTML only)
        run: |
          cd ebook
          quarto render --to html

      - name: Post-procesamiento y reorganización
        run: |
          set -e
          cd ebook
          echo "=== Ejecutando post-procesamiento ==="
          python3 post_process.py

      - name: Generar landing page raíz
        run: |
          cd ebook/_book
          cat > index.html << 'LANDING'
